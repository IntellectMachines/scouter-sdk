# .github/workflows/publish.yml
#
# CI/CD pipeline for the scouter-sdk Node package only.
#   - Node package lives in ./node (package.json -> "@scouter-ai/core" on npm)
#
# PyPI publishing is intentionally NOT in this workflow.
# `scouter-ai 0.1.0` is already on PyPI; future Python releases will be cut
# manually until we re-introduce a separate PyPI workflow.
#
# Triggers:
#   * push to master         -> tests + build only (no publish)
#   * GitHub Release created -> tests + build + publish to npm
#
# Required repository secret (Settings > Secrets and variables > Actions):
#   * NPM_TOKEN -> npm automation token with publish rights to the @scouter-ai scope
#                  (the @scouter-ai org must exist on npmjs.com first)

name: Publish scouter-sdk (npm)

on:
  push:
    branches: [master]
  release:
    types: [created]

# Avoid concurrent publishes for the same ref.
concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Build & Publish to npm
    runs-on: ubuntu-latest
    # Required for `npm publish --provenance` to mint a Sigstore attestation
    # via GitHub's OIDC provider. `contents: read` is the minimum needed by
    # actions/checkout once we narrow permissions away from the default.
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Configures ~/.npmrc so `npm publish` reads NODE_AUTH_TOKEN.
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        # Prefer reproducible installs when a lockfile exists; otherwise fall back.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # ----- Tests (only if a "test" script and tests/ directory exist) ----
      - name: Run npm test
        run: |
          HAS_TEST_SCRIPT=$(node -p "Boolean(require('./package.json').scripts && require('./package.json').scripts.test)")
          if [ "$HAS_TEST_SCRIPT" = "true" ] && [ -d tests ]; then
            npm test
          else
            echo "No npm tests found - skipping."
          fi

      # ----- Bump version from release tag ---------------------------------
      # On a release event GITHUB_REF_NAME is the tag (e.g. "v0.2.0"); strip
      # the leading "v" so npm sees a clean semver. No-op on push events.
      - name: Bump version in package.json
        if: github.event_name == 'release'
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          NEW_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$NEW_VERSION" ]; then
            echo "::error::Could not derive version from tag '${GITHUB_REF_NAME}'."
            exit 1
          fi
          echo "Bumping @scouter/core to ${NEW_VERSION}"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

      # ----- Build (only if a "build" script exists) -----------------------
      - name: Build package
        run: |
          HAS_BUILD=$(node -p "Boolean(require('./package.json').scripts && require('./package.json').scripts.build)")
          if [ "$HAS_BUILD" = "true" ]; then
            npm run build
          else
            echo "No npm build script defined - skipping."
          fi

      # ----- Publish (release events only) ---------------------------------
      - name: Publish to npm
        if: github.event_name == 'release'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          # `--access public` is required for the first publish of a scoped package
          # (e.g. @scouter-ai/core). Subsequent publishes accept it as a no-op.
          # `--provenance` mints a Sigstore attestation; needs id-token: write above.
          npm publish --access public --provenance
